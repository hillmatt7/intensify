name: CI

on:
  push:
    branches: [main, master, rust-port]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust-tests:
    name: cargo nextest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: cargo nextest
        # intensify-pyo3 uses the extension-module feature which omits libpython from
        # the link flags (correct for .so loading), but that makes cargo test/nextest
        # fail to link on macOS. Python integration is covered by the pytest job.
        run: cargo nextest run --workspace --exclude intensify-pyo3 --no-fail-fast

  python-tests:
    name: pytest ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Install Python deps and build extension
        # pip invokes maturin's PEP 517 build backend, which does not require a
        # virtualenv. Do NOT call `maturin develop` here — that CLI command requires
        # an active virtualenv and would fail on the bare GitHub Actions Python.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        env:
          MPLBACKEND: Agg
        run: pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check python/ tests/

      - name: ruff format --check
        run: ruff format --check python/ tests/

  stubs:
    name: generated stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: stubs

      - name: Regenerate stubs
        run: |
          cargo run -p intensify-pyo3 --bin stub-gen
          pip install ruff
          ruff format python/intensify/__init__.pyi python/intensify/_libintensify.pyi

      - name: Check generated stubs are committed
        run: git diff --exit-code -- python/intensify/__init__.pyi python/intensify/_libintensify.pyi

  docs:
    name: sphinx build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"

      - name: sphinx-build
        run: sphinx-build -W -b html docs docs/_build/html

      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
