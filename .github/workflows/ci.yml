name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch
          hatch env create

      - name: Lint with ruff
        run: hatch run lint:check

      - name: Test with pytest
        run: hatch run pytest:test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" mypy

      - name: mypy
        run: mypy intensify --ignore-missing-imports --no-strict-optional || true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch
          pip install -e ".[docs]"

      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html

  readme-doctest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Doctest README
        env:
          MPLBACKEND: Agg
        run: |
          python -c "
          import os, re, sys, subprocess
          src = open('README.md').read()
          blocks = re.findall(r'\`\`\`python\n(.*?)\n\`\`\`', src, flags=re.S)
          if not blocks:
              print('No python blocks found in README'); sys.exit(0)
          code = blocks[0]
          print('Running README quickstart block...')
          env = dict(os.environ, MPLBACKEND='Agg')
          subprocess.check_call([sys.executable, '-c', code], env=env)
          "

  build:
    runs-on: ubuntu-latest
    needs: [test, typecheck, docs]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          pip install hatch
          hatch build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
