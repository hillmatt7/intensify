name: Build wheels + publish to PyPI

# Triggers:
#   - Tag push v*.*.*  → full matrix build + PyPI publish via OIDC.
#   - workflow_dispatch → matrix build only, artifacts uploaded, no publish.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --interpreter python3.10 python3.11 python3.12 -o dist
          manylinux: auto
          # Install Rust 1.92 inside the manylinux container.
          before-script-linux: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92.0
            source "$HOME/.cargo/env"
      - name: Smoke test (x86_64 only — aarch64 is emulated, too slow)
        if: matrix.target == 'x86_64'
        run: |
          pip install --no-index --find-links dist intensify
          python -c "
          import intensify as its, numpy as np
          mh = its.MultivariateHawkes(n_dims=3, mu=[0.3]*3,
              kernel=its.ExponentialKernel(alpha=0.1, beta=1.5))
          ev = mh.simulate(T=50.0, seed=0)
          r = mh.fit(ev, T=50.0, fit_decay=False)
          assert np.isfinite(r.log_likelihood)
          print('linux smoke OK', r.branching_ratio_)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl

  macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            os: macos-15-intel
          - target: aarch64
            os: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --interpreter python3.10 python3.11 python3.12 -o dist
      - name: Smoke test
        run: |
          pip install --no-index --find-links dist intensify
          python -c "
          import intensify as its, numpy as np
          mh = its.MultivariateHawkes(n_dims=3, mu=[0.3]*3,
              kernel=its.ExponentialKernel(alpha=0.1, beta=1.5))
          ev = mh.simulate(T=50.0, seed=0)
          r = mh.fit(ev, T=50.0, fit_decay=False)
          assert np.isfinite(r.log_likelihood)
          print('macos smoke OK', r.branching_ratio_)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --strip --interpreter python3.10 python3.11 python3.12 -o dist
      - name: Smoke test
        run: |
          pip install --no-index --find-links dist intensify
          python -c "import intensify as its, numpy as np; mh = its.MultivariateHawkes(n_dims=3, mu=[0.3]*3, kernel=its.ExponentialKernel(alpha=0.1, beta=1.5)); ev = mh.simulate(T=50.0, seed=0); r = mh.fit(ev, T=50.0, fit_decay=False); assert np.isfinite(r.log_likelihood); print('windows smoke OK', r.branching_ratio_)"
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/*.whl

  sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    # Tag-pushes only — manual dispatch never publishes.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/intensify/
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Verify distribution metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
