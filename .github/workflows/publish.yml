name: Build wheels + publish to PyPI

# Triggers:
#   - Tag push v*.*.*  → full matrix build + PyPI publish via OIDC.
#   - workflow_dispatch → matrix build only, artifacts uploaded, no publish.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_wheels:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            archs: x86_64
          - os: ubuntu-latest
            target: aarch64
            archs: aarch64
          # macos-13 was retired Dec 2025; Intel macOS wheels use macos-15-intel.
          - os: macos-15-intel
            target: x86_64
            archs: x86_64
          - os: macos-15
            target: aarch64
            archs: arm64
          - os: windows-latest
            target: x86_64
            archs: AMD64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      # Host Rust needs linux-aarch64 for some cibuildwheel paths; ARM macOS runners
      # already have aarch64-apple-darwin as the default host.
      - name: rustup target (linux cross)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Set up QEMU (linux aarch64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: ${{ matrix.archs }}
          # Tell cibuildwheel to use maturin via PEP 517 build-system.
          CIBW_BUILD_FRONTEND: "build"
          # Rust toolchain inside the manylinux container.
          CIBW_BEFORE_ALL_LINUX: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92.0 && source $HOME/.cargo/env && rustup target add ${{ matrix.target == 'aarch64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}"
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_TEST_REQUIRES: "pytest numpy scipy"
          CIBW_TEST_COMMAND: >
            python -c "import intensify as its, numpy as np;
            mh = its.MultivariateHawkes(n_dims=3, mu=[0.3]*3,
              kernel=its.ExponentialKernel(alpha=0.1, beta=1.5));
            ev = mh.simulate(T=50.0, seed=0);
            r = mh.fit(ev, T=50.0, fit_decay=False);
            assert np.isfinite(r.log_likelihood);
            print('wheel smoke test OK', r.branching_ratio_)"
          # Skip emulated test runs (qemu) — too slow.
          CIBW_TEST_SKIP: "*-linux_aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip maturin
          maturin sdist -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Tag-pushes only — manual dispatch never publishes.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/intensify/
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Verify distribution metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
